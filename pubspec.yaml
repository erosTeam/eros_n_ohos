name: eros_n
description: An unofficial nhentai app.

publish_to: 'none'
version: 1.2.1+29

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.9
  dio: ^5.9.2
  dio_cookie_manager: ^3.4.0
  cookie_jar: ^4.0.9
  collection: ^1.19.1
  logger: ^2.7.0
  path_provider: ^2.1.5
  path_provider_harmonyos: ^0.0.1
  intl: ^0.20.0
  dynamic_color: ^1.8.1
  flutter_inappwebview: ^6.1.5
  http: ^1.6.0
  webview_flutter: ^4.0.2
  html: ^0.15.6
  # database: sqflite (HarmonyOS adaptation via OpenHarmony SIG)
  sqflite: any
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  cached_network_image: ^3.4.1
  font_awesome_flutter: ^11.0.0
  flutter_cache_manager: ^3.4.1
  octo_image: ^2.1.0
  dio_cache_interceptor: ^3.5.1
  dio_cache_interceptor_hive_store: ^4.0.0
  flutter_list_view: ^1.1.29
  waterfall_flow: ^3.1.1
  hooks_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.0
  auto_route: ^11.1.0
  flutter_smart_dialog: ^5.1.0
  sliver_tools: ^0.2.12
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  photo_view: ^0.15.0
  preload_page_view: ^0.2.0
  flutter_hooks: ^0.21.3
  url_launcher: ^6.3.2
  # replaced deprecated share with share_plus
  share_plus: ^13.1.0
  copy_with_extension: ^14.0.0
  path: ^1.9.1
  archive: ^4.0.9
  package_info_plus: ^10.1.0
  package_info_plus_harmonyos: ^0.0.1
  rotated_corner_decoration: ^2.1.0+1
  # replaced window_size (archived) + bitsdojo_window with window_manager
  window_manager: ^0.5.1
  webview_windows:
    git:
      url: https://github.com/xioxin/flutter-webview-windows.git
      ref: 4837e6d
  system_network_proxy: #^1.0.2
    git:
      url: https://github.com/honjow/system_network_proxy.git
      path: system_network_proxy
  system_proxy: ^0.1.0
  scrollable_positioned_list: ^0.3.8
  gesture_zoom_box: ^0.0.4
  flutter_keyboard_visibility: ^6.0.0
  flutter_typeahead: ^6.0.0

  fluentui_system_icons: ^1.1.273
  palette_generator: ^0.3.3+7
  nil: ^1.1.1
  open_by_default:
    git:
      url: https://github.com/honjow/open_by_default.git
  flutter_android_volume_keydown:
    git:
      url: https://github.com/honjow/flutter_android_volume_keydown.git
      ref: dev
  # replaced deprecated wakelock with wakelock_plus
  wakelock_plus: ^1.6.0
  uuid: ^4.5.3
  animations: ^2.1.2
  flutter_socks_proxy: ^0.0.3

  clock: any
  crypto: ^3.0.0
  liquid_glass_widgets: ^0.8.4
dev_dependencies:
  # Code generation tools removed in ohos fork — generated files are committed.
  # Run `flutter pub run build_runner build` in the main project (eros_n) instead.
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  nhentai: ^1.0.0-dev.9


flutter:
  uses-material-design: true

flutter_intl:
  enabled: true
  class_name: L10n


# flutter pub run index_generator
index_generator:
  exclude:
    - '**.g.dart'
    - '**.freezed.dart'
  indexes:
    - path: lib/component/models
      name: index
    - path: lib/common/parser
      name: parser

dependency_overrides:
  # Force all packages to use the HarmonyOS-adapted sqflite fork.
  sqflite:
    git:
      url: "https://atomgit.com/openharmony-sig/flutter_sqflite.git"
      path: "sqflite"
  sqflite_common:
    git:
      url: "https://atomgit.com/openharmony-sig/flutter_sqflite.git"
      path: "sqflite_common"
  # HarmonyOS-adapted flutter_inappwebview (OpenHarmony SIG).
  flutter_inappwebview:
    git:
      url: "https://gitcode.com/openharmony-sig/flutter_inappwebview.git"
      path: "flutter_inappwebview"
  # Pinned to last versions supporting Dart <3.10 (flutter-ohos Dart SDK is 3.9.2).
  # Once flutter-ohos upgrades its Dart SDK these overrides can be removed.
  wakelock_plus: ^1.4.0
  package_info_plus: ^8.0.0
  share_plus: ^10.0.0
  url_launcher: ^6.2.0
  flutter_keyboard_visibility: ^5.4.0
  flutter_typeahead: ^5.2.0
  dio_cache_interceptor: ^3.4.0
  meta: ^1.17.0
