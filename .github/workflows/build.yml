name: Build OHOS

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master

# Only keep the latest run per ref to avoid queue pile-ups.
concurrency:
  group: build-ohos-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────────────────────────────────────────────
# This workflow requires a self-hosted runner that has the following pre-installed:
#   • OpenHarmony Command Line Tools 6.1.0 at $OHOS_CLI_HOME
#     (default: ~/devtool/ohos/command-line-tools)
#   • flutter-ohos fork installed via FVM as the "ohos" custom version
#     (default: ~/fvm/versions/ohos/oh-3.35.7-release)
#   • Java 17+ on PATH (needed by hvigor)
#   • ohpm on PATH (bundled with the Command Line Tools)
#
# Register the runner:
#   Settings → Actions → Runners → New self-hosted runner
#   Then: ./config.sh --labels ohos  &&  ./run.sh
# ──────────────────────────────────────────────────────────────────────────────

env:
  # Paths relative to the runner home; override via repo/org variables if needed.
  FLUTTER_OHOS: ${{ vars.FLUTTER_OHOS || '~/fvm/versions/ohos/oh-3.35.7-release' }}
  OHOS_CLI_HOME: ${{ vars.OHOS_CLI_HOME || '~/devtool/ohos/command-line-tools' }}
  OHOS_SDK_HOME: ${{ vars.OHOS_SDK_HOME || '~/devtool/ohos/command-line-tools/sdk' }}

jobs:
  build_hap:
    name: Build unsigned HAP
    runs-on: [self-hosted, ohos]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Resolve tool paths
        id: paths
        shell: bash
        run: |
          FLUTTER=$(eval echo "$FLUTTER_OHOS")/flutter
          OHPM=$(eval echo "$OHOS_CLI_HOME")/ohpm/bin/ohpm
          echo "flutter=$FLUTTER" >> "$GITHUB_OUTPUT"
          echo "ohpm=$OHPM"       >> "$GITHUB_OUTPUT"
          echo "Flutter : $FLUTTER"
          "$FLUTTER" --version
          "$OHPM" --version

      - name: Get app version
        shell: bash
        run: |
          version=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "APP_VERSION=$version" >> "$GITHUB_ENV"
          echo "App version: $version"

      - name: Configure flutter-ohos SDK path
        shell: bash
        run: |
          ${{ steps.paths.outputs.flutter }} config \
            --ohos-sdk "$(eval echo "$OHOS_SDK_HOME")"

      - name: Flutter pub get
        shell: bash
        run: ${{ steps.paths.outputs.flutter }} pub get

      - name: Build unsigned HAP (debug, arm64)
        shell: bash
        run: |
          ${{ steps.paths.outputs.flutter }} build hap \
            --debug \
            --target-platform ohos-arm64 \
            --no-codesign

      - name: Rename artifact
        shell: bash
        run: |
          src="build/ohos/hap/entry-default-unsigned.hap"
          dst="build/ohos/hap/Eros-N_${APP_VERSION}_ohos-arm64-unsigned.hap"
          mv "$src" "$dst"
          echo "HAP_PATH=$dst" >> "$GITHUB_ENV"

      - name: Upload unsigned HAP
        uses: actions/upload-artifact@v4
        with:
          name: ohos-hap-unsigned
          path: ${{ env.HAP_PATH }}
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish to GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build_hap
    runs-on: [self-hosted, ohos]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get app version
        shell: bash
        run: |
          version=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "APP_VERSION=$version" >> "$GITHUB_ENV"

      - name: Download HAP artifact
        uses: actions/download-artifact@v4
        with:
          name: ohos-hap-unsigned
          path: /tmp/artifacts

      - name: Upload to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: /tmp/artifacts/*.hap
          tag: ${{ github.ref_name }}
          bodyFile: changelog/v${{ env.APP_VERSION }}.md
          prerelease: ${{ contains(github.ref, 'pre') }}
          allowUpdates: true
          artifactErrorsFailBuild: true
          replacesArtifacts: true
